<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>La Grande Fête</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta property="og:title" content="La Grande Fête">
        <meta property="og:description" content="Information about Anne and Guido's wedding party.">
        <meta property="og:image" content="https://raw.githubusercontent.com/amickan/la-grande-fete/main/assets/family-bike.jpg">
        <meta property="og:url" content="https://github.com/amickan/la-grande-fete/">
        <meta property="og:type" content="website">

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <!-- Same fonts as the main website -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

        <style>
            :root {
                --paper: #f7f2e9;
                --ink: #332d24;
                --ink-soft: #5f5748;
                --olive: #74815a;
                --brass: #c99a44;
                --clay: #af6e82;
                --lavender: #8a76a0;
                --line: #ddd2ba;
            }

            * { box-sizing: border-box; }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: 'Inter', sans-serif;
                background: var(--paper);
                color: var(--ink);
                -webkit-font-smoothing: antialiased;
            }

            .staticrypt-content {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 20px;
            }

            .staticrypt-page {
                max-width: 560px;
                width: 100%;
                margin: auto;
                text-align: center;
                background: #fffdf8;
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 44px 40px 36px 40px;
                box-shadow: 0 20px 50px rgba(51, 45, 36, 0.08);
            }

            /* --- Header Styling (Mirrored from main site) --- */
            header { text-align: center; margin-bottom: 20px; }

            .ornament {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 18px;
            }
            .ornament svg { width: 150px; height: auto; }

            .hero-photo {
                position: relative;
                width: 220px;
                height: 220px;
                border-radius: 50%;
                margin: 0 auto 14px auto;
                background: #ffffff;
                overflow: hidden;
                /* animation: hero-pulse 3.5s ease-in-out infinite; */
            }

            @keyframes hero-pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(201, 154, 68, 0.0); }
                50% { box-shadow: 0 0 0 10px rgba(201, 154, 68, 0.08); }
            }

            .hero-photo img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                padding: 24px;
                display: block;
                filter: saturate(0.88) contrast(1.02);
            }
            
            .hero-photo::after {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: radial-gradient(circle, transparent 35%, #fffdf8 95%);
                pointer-events: none;
            }

            .staticrypt-title {
                font-family: 'Cormorant Garamond', serif;
                font-weight: 500;
                font-size: clamp(36px, 7vw, 46px);
                letter-spacing: 0.01em;
                margin: 0 0 6px 0;
                color: var(--ink);
                line-height: 1.05;
            }

            .subtitle {
                font-family: 'Inter', sans-serif;
                font-size: 14.5px;
                color: var(--ink-soft);
                margin: 0 0 24px 0;
            }
            
            .rule {
                width: 48px;
                height: 1px;
                background: var(--brass);
                margin: 24px auto;
            }

            /* --- Form Styling --- */
            .staticrypt-form {
                max-width: 280px;
                margin: 0 auto;
                position: relative;
            }

            .staticrypt-password-container {
                position: relative;
                width: 100%;
                margin-bottom: 24px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                font-family: 'Inter', sans-serif;
                font-size: 16px;
                padding: 10px 40px 10px 10px;
                border: none;
                border-bottom: 1px solid var(--line);
                background: transparent;
                color: var(--ink);
                width: 100%;
                outline: none;
                text-align: center;
                transition: border-bottom-color 0.15s ease;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-bottom-color: var(--clay);
            }

            .staticrypt-form input::placeholder {
                color: #b7ab93;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 32px;
                height: 32px;
                padding: 6px;
                opacity: 0.4;
                transition: opacity 0.15s ease;
            }
            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.7;
            }

            label.staticrypt-remember {
                font-family: 'Inter', sans-serif;
                font-size: 13.5px;
                color: var(--ink-soft);
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 24px;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--clay);
                margin-right: 8px;
                cursor: pointer;
                width: 16px;
                height: 16px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Cormorant Garamond', serif;
                font-weight: 600;
                font-size: 17px;
                letter-spacing: 0.03em;
                background: none;
                color: var(--clay);
                border: 1px solid var(--clay);
                border-radius: 0;
                padding: 10px 40px;
                cursor: pointer;
                transition: background 0.15s ease, color 0.15s ease;
                display: inline-block;
                width: auto;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--clay);
                color: #fff;
                outline: none;
            }

            .hidden { display: none !important; }

            /* --- Spinner Styling --- */
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.2em solid var(--line);
                border-right-color: var(--clay);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
